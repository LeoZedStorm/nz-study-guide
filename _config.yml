# The Site Configuration
# Based on the chirpy-starter template › https://github.com/cotes2020/chirpy-starter

theme: jekyll-theme-chirpy

# 界面语言（zh-CN 会启用 Chirpy 自带的中文界面文案）
lang: zh-CN

timezone: Pacific/Auckland

# jekyll-seo-tag settings › https://github.com/jekyll/jekyll-seo-tag/blob/master/docs/usage.md
# ↓ --------------------------

title: NZ Study Guide

tagline: 新西兰留学指南 · 附川大-奥克兰联合项目课程介绍

description: >-
  新西兰留学生活实用指南（签证/住宿/驾照/打工等，对所有留学生通用），
  附四川大学-奥克兰大学计算机科学与技术（中外合作办学）项目专属课程介绍。

url: "https://leozedstorm.github.io"

github:
  username: LeoZedStorm

social:
  name: Leo
  email: leo.zed@outlook.com
  links:
    - https://github.com/LeoZedStorm

webmaster_verifications:
  google:
  bing:
  alexa:
  yandex:
  baidu:
  facebook:

# ↑ --------------------------
# The end of `jekyll-seo-tag` settings

analytics:
  google:
    id:
  goatcounter:
    id: leozed
  umami:
    id:
    domain:
  matomo:
    id:
    domain:
  cloudflare:
    id:
  fathom:
    id:

pageviews:
  provider: goatcounter

theme_mode: # [light | dark]

cdn:

avatar: /assets/img/avatar.jpeg

social_preview_image:

toc: true

actions:
  edit_post:
    enabled: false
    url: ""
    static_url: false

comments:
  provider: giscus
  disqus:
    shortname:
  utterances:
    repo:
    issue_term:
  giscus:
    repo: LeoZedStorm/nz-study-guide
    repo_id: R_kgDOTgshaQ
    category: Announcements
    category_id: DIC_kwDOTgshac4DBw7o
    mapping: pathname
    strict: "0"
    input_position: bottom
    lang: zh-CN
    reactions_enabled: "1"

assets:
  self_host:
    enabled:
    env:

pwa:
  enabled: true
  cache:
    enabled: true
    deny_paths:

paginate: 10

# 项目页部署在 /nz-study-guide/ 子路径下
baseurl: "/nz-study-guide"

# ------------ The following options are not recommended to be modified ------------------

kramdown:
  footnote_backlink: "&#8617;&#xfe0e;"
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight
    span:
      line_numbers: false
    block:
      line_numbers: true
      start_line: 1

collections:
  tabs:
    output: true
    sort_by: order

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      comments: true
      toc: true
      permalink: /posts/:title/
  - scope:
      path: _drafts
    values:
      comments: false
  - scope:
      path: ""
      type: tabs
    values:
      layout: page
      permalink: /:title/

sass:
  style: compressed

compress_html:
  clippings: all
  comments: all
  endings: all
  profile: false
  blanklines: false
  ignore:
    envs: [development]

exclude:
  - "*.gem"
  - "*.gemspec"
  - docs
  - tools
  - README.md
  - LICENSE
  - CONTENT-PLAN.md
  - "*.doc"
  - "*.docx"
  - purgecss.js
  - "*.config.js"
  - "package*.json"

jekyll-archives:
  enabled: [categories, tags]
  layouts:
    category: category
    tag: tag
  permalinks:
    tag: /tags/:name/
    category: /categories/:name/
